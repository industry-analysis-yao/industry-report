name: Update Dashboard Data

on:
  schedule:
    # Daily at 22:00 UTC = 06:00 JST/Beijing (UTC+8)
    - cron: '0 22 * * *'
  workflow_dispatch:
    inputs:
      cleanup:
        description: 'Run cleanup (remove items older than 90 days)'
        required: false
        default: 'false'
        type: boolean

jobs:
  update:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          persist-credentials: true

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Fetch news
        env:
          GOOGLE_API_KEY: ${{ secrets.GOOGLE_API_KEY }}
          GOOGLE_CSE_ID: ${{ secrets.GOOGLE_CSE_ID }}
        run: python scripts/fetch_news.py

      - name: Generate summaries
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
        run: python scripts/generate_dashboard.py

      - name: Cleanup old data (if requested)
        if: ${{ github.event.inputs.cleanup == 'true' }}
        run: python scripts/cleanup_old_data.py

      - name: Commit and push changes
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/news_data.json
          if git diff --cached --quiet; then
            echo "No changes to commit."
          else
            git commit -m "chore: update news_data.json [skip ci]"
            git push
          fi
